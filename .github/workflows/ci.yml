name: CI

# PR 과 main 직접 푸시에서 Django 시스템 점검 + 테스트를 실행한다.
# 자동 생성되는 수정 PR도 이 게이트를 통과해야 머지 대상이 된다.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # base.py 는 .env 가 없으면 os.environ 기본값을 쓴다. CI 전용 더미 값만 주입.
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_SECRET_KEY: ci-dummy-secret-key-not-for-production
      DEBUG: 'False'
      DJANGO_DB_ENGINE: sqlite3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Run tests
        run: python manage.py test --verbosity 2
